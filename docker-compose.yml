version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flask_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flask_db
      MYSQL_USER: flask_user
      MYSQL_PASSWORD: flask_password
    ports:
      - "3331:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flask_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flask_user", "-pflask_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  flask:
    build: .
    container_name: flask_app
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: flask_db
      DB_USER: flask_user
      DB_PASSWORD: flask_password
      FLASK_ENV: development
      SECRET_KEY: change_this_secret_key_in_production
    ports:
      - "3030:3030"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - flask_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flask_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - flask_network

volumes:
  mysql_data:

networks:
  flask_network:
