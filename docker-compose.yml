version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flask_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flask_db
      MYSQL_USER: flask_user
      MYSQL_PASSWORD: flask_password
    ports:
      - "3331:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flask_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flask_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3333
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - flask_network

volumes:
  mysql_data:


networks:
  flask_network:
